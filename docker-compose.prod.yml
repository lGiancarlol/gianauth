version: "3.9"

# Production compose — PostgreSQL, restart always, structured JSON logging
# Usage: docker compose -f docker-compose.prod.yml up -d
# Required env vars: JWT_SECRET, DATABASE_URL, FRONTEND_URL, NEXT_PUBLIC_API_URL
#                    DISCORD_BOT_TOKEN, DISCORD_CLIENT_ID, DISCORD_CHANNEL_ID,
#                    DISCORD_OWNER_ROLE_ID, OWNER_API_TOKEN, PANEL_URL

services:
  backend:
    build: ./backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_SECRET: ${SERVICE_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      LOG_LEVEL: info
    volumes:
      - backend_data:/app/prisma
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build: ./discord-bot
    restart: always
    environment:
      NODE_ENV: production
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID}
      DISCORD_OWNER_ROLE_ID: ${DISCORD_OWNER_ROLE_ID}
      API_URL: ${API_URL:-http://backend:4000/api}
      SERVICE_SECRET: ${SERVICE_SECRET}
      OWNER_API_TOKEN:
      PANEL_URL: ${PANEL_URL}
      BOT_DB_PATH: /app/prisma/dev.db
    volumes:
      - backend_data:/app/prisma
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - bot
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  backend_data:
